[theme]
base = "dark"
primaryColor = "#6c8cff"
backgroundColor = "#0b1020"
secondaryBackgroundColor = "#10172f"
textColor = "#e7ecff"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"
maxUploadSize = 20

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
